function stickerMarkup(index) {
  const labels = ["done", "gold", "focus", "ace"];
  return `<span class="checkin-sticker sticker-${(index % 4) + 1}">${labels[index % labels.length]}</span>`;
}

function renderCheckin(store) {
  const state = store.getState();
  const today = new Date();
  const year = today.getFullYear();
  const month = today.getMonth();
  const days = new Date(year, month + 1, 0).getDate();

  const el = document.createElement("div");
  el.className = "stack-layout";

  const completedSet = new Set(state.studyLog.map((entry) => entry.date.slice(0, 10)));
  const dayCells = Array.from({ length: days }, (_, index) => {
    const day = String(index + 1).padStart(2, "0");
    const dateKey = `${state.checkin.today.slice(0, 8)}${day}`;
    const isDone = completedSet.has(dateKey);
    const isToday = dateKey === state.checkin.today;
    return `
      <div class="calendar-cell ${isDone ? "done" : ""} ${isToday ? "today" : ""}">
        <span class="calendar-number">${index + 1}</span>
        ${isDone ? stickerMarkup(index) : ""}
      </div>
    `;
  }).join("");

  el.innerHTML = `
    <section class="paper-panel">
      <div class="reading-header">
        <div>
          <p class="label">Check-in Calendar</p>
          <h3>${state.checkin.isCheckedIn ? "今日已打卡" : "今日未打卡"}</h3>
        </div>
        <p>${state.checkin.completedActions.length} 个有效学习动作</p>
      </div>
      <div class="calendar-grid">${dayCells}</div>
      <ul class="activity-list">
        ${state.checkin.completedActions
          .map((item) => `<li>${new Date(item.date).toLocaleTimeString("zh-CN", { hour: "2-digit", minute: "2-digit" })} · ${item.title}</li>`)
          .join("")}
      </ul>
    </section>
  `;

  return el;
}




/**
 * Hand-drawn audio player with real <audio> playback.
 * Supports volume control and falls back to simulated mode when no audio source.
 */
function createAudioPlayer(options = {}) {
  const {
    duration = 120,
    label = "🎧 对话音频",
    audioSrc = null,
    onEnded,
  } = options;

  const hasAudio = !!audioSrc;
  let isPlaying = false;
  let currentTime = 0;
  let volume = 0.8;
  let intervalId = null;
  let _onEnded = onEnded;

  // Hidden native audio element
  const nativeAudio = hasAudio ? document.createElement("audio") : null;
  if (nativeAudio) {
    nativeAudio.src = audioSrc;
    nativeAudio.volume = volume;
    nativeAudio.preload = "auto";
  }

  const container = document.createElement("div");
  container.className = "audio-player";

  container.innerHTML = `
    <div class="audio-player-inner">
      <div class="audio-player-controls">
        <button class="audio-btn audio-btn-play" data-audio-action="play" title="播放">
          ${icon("play")}
        </button>
        <button class="audio-btn audio-btn-replay" data-audio-action="replay" title="重播">
          ${icon("replay")}
        </button>
      </div>
      <div class="audio-player-track">
        <div class="audio-progress-bar" data-audio-progress-bar>
          <div class="audio-progress-fill" data-audio-progress-fill style="width:0%"></div>
          <div class="audio-progress-thumb" data-audio-progress-thumb style="left:0%"></div>
        </div>
        <div class="audio-player-info">
          <span class="audio-label">${label}</span>
          <span class="audio-time" data-audio-time-current>0:00</span>
          <span class="audio-time-sep">/</span>
          <span class="audio-time" data-audio-time-total>${hasAudio ? "--:--" : formatTime(duration)}</span>
        </div>
      </div>
      <div class="audio-volume-control">
        <span class="audio-volume-icon" data-audio-mute-btn title="静音">🔊</span>
        <div class="audio-volume-slider" data-audio-volume-slider>
          <div class="audio-volume-fill" data-audio-volume-fill style="width:80%"></div>
          <div class="audio-volume-thumb" data-audio-volume-thumb style="left:80%"></div>
        </div>
      </div>
    </div>
  `;

  const playBtn = container.querySelector('[data-audio-action="play"]');
  const replayBtn = container.querySelector('[data-audio-action="replay"]');
  const progressBar = container.querySelector("[data-audio-progress-bar]");
  const progressFill = container.querySelector("[data-audio-progress-fill]");
  const progressThumb = container.querySelector("[data-audio-progress-thumb]");
  const timeCurrent = container.querySelector("[data-audio-time-current]");
  const timeTotal = container.querySelector("[data-audio-time-total]");
  const volumeSlider = container.querySelector("[data-audio-volume-slider]");
  const volumeFill = container.querySelector("[data-audio-volume-fill]");
  const volumeThumb = container.querySelector("[data-audio-volume-thumb]");
  const muteBtn = container.querySelector("[data-audio-mute-btn]");
  let prevVolume = volume;
  let isMuted = false;

  function updateUI() {
    const total = getDuration();
    const pct = total > 0 ? Math.min((currentTime / total) * 100, 100) : 0;
    progressFill.style.width = `${pct}%`;
    progressThumb.style.left = `${pct}%`;
    timeCurrent.textContent = formatTime(currentTime);
    if (hasAudio && nativeAudio && !isNaN(nativeAudio.duration)) {
      timeTotal.textContent = formatTime(nativeAudio.duration);
    }

    if (isPlaying) {
      playBtn.innerHTML = icon("pause");
      playBtn.setAttribute("title", "暂停");
    } else {
      playBtn.innerHTML = icon("play");
      playBtn.setAttribute("title", "播放");
    }
  }

  function updateVolumeUI() {
    const pct = isMuted ? 0 : volume * 100;
    volumeFill.style.width = `${pct}%`;
    volumeThumb.style.left = `${pct}%`;
    muteBtn.textContent = isMuted || volume === 0 ? "🔇" : volume < 0.5 ? "🔉" : "🔊";
  }

  function getDuration() {
    if (hasAudio && nativeAudio && !isNaN(nativeAudio.duration)) {
      return nativeAudio.duration;
    }
    return duration;
  }

  // --- Playback logic ---
  function startPlayback() {
    if (isPlaying) return;
    isPlaying = true;
    updateUI();

    if (hasAudio && nativeAudio) {
      nativeAudio.play().catch(() => {
        // Autoplay blocked — fall back to simulated
        startSimulated();
      });
    } else {
      startSimulated();
    }
  }

  function startSimulated() {
    intervalId = setInterval(() => {
      currentTime += 0.5;
      const total = getDuration();
      if (currentTime >= total) {
        currentTime = total;
        pausePlayback();
        _onEnded?.();
      }
      updateUI();
    }, 500);
  }

  function pausePlayback() {
    isPlaying = false;
    if (nativeAudio && hasAudio) nativeAudio.pause();
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    updateUI();
  }

  function resetPlayback() {
    pausePlayback();
    currentTime = 0;
    if (nativeAudio && hasAudio) nativeAudio.currentTime = 0;
    updateUI();
  }

  function seekTo(e) {
    const rect = progressBar.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));
    const total = getDuration();
    currentTime = pct * total;
    if (nativeAudio && hasAudio) nativeAudio.currentTime = currentTime;
    updateUI();
  }

  function setVolume(v) {
    volume = Math.max(0, Math.min(1, v));
    if (nativeAudio && hasAudio) nativeAudio.volume = volume;
    if (volume > 0) isMuted = false;
    updateVolumeUI();
  }

  function toggleMute() {
    if (isMuted || volume === 0) {
      isMuted = false;
      volume = prevVolume || 0.8;
    } else {
      prevVolume = volume;
      isMuted = true;
    }
    if (nativeAudio && hasAudio) nativeAudio.volume = isMuted ? 0 : volume;
    updateVolumeUI();
  }

  function seekVolume(e) {
    const rect = volumeSlider.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const pct = Math.max(0, Math.min(1, x / rect.width));
    setVolume(pct);
  }

  // --- Event listeners ---
  playBtn.addEventListener("click", () => {
    if (isPlaying) {
      pausePlayback();
    } else {
      if (currentTime >= getDuration()) currentTime = 0;
      startPlayback();
    }
  });

  replayBtn.addEventListener("click", resetPlayback);

  let isDragging = false;
  progressBar.addEventListener("mousedown", (e) => {
    isDragging = true;
    seekTo(e);
  });
  document.addEventListener("mousemove", (e) => {
    if (isDragging) seekTo(e);
  });
  document.addEventListener("mouseup", () => { isDragging = false; });

  // Native audio events
  if (nativeAudio) {
    nativeAudio.addEventListener("timeupdate", () => {
      if (hasAudio) {
        currentTime = nativeAudio.currentTime;
        updateUI();
      }
    });
    nativeAudio.addEventListener("ended", () => {
      isPlaying = false;
      updateUI();
      _onEnded?.();
    });
    nativeAudio.addEventListener("loadedmetadata", () => {
      timeTotal.textContent = formatTime(nativeAudio.duration);
      updateUI();
    });
    nativeAudio.addEventListener("play", () => {
      isPlaying = true;
      updateUI();
    });
    nativeAudio.addEventListener("pause", () => {
      isPlaying = false;
      updateUI();
    });
  }

  // Volume slider
  let volDragging = false;
  volumeSlider.addEventListener("mousedown", (e) => {
    volDragging = true;
    seekVolume(e);
  });
  document.addEventListener("mousemove", (e) => {
    if (volDragging) seekVolume(e);
  });
  document.addEventListener("mouseup", () => { volDragging = false; });
  muteBtn.addEventListener("click", toggleMute);

  // --- Public API ---
  container.play = startPlayback;
  container.pause = pausePlayback;
  container.reset = resetPlayback;
  container.getCurrentTime = () => currentTime;
  container.getDuration = getDuration;
  container.isPlaying = () => isPlaying;
  container.setVolume = setVolume;
  container.setOnEnded = (fn) => { _onEnded = fn; };
  container.setAudioSource = (src) => {
    // Not supported after creation — reload page
  };

  container._cleanup = () => {
    if (intervalId) clearInterval(intervalId);
    if (nativeAudio) {
      nativeAudio.pause();
      nativeAudio.src = "";
      nativeAudio.load();
    }
  };

  updateUI();
  updateVolumeUI();
  return container;
}

function formatTime(seconds) {
  if (isNaN(seconds) || seconds === Infinity) return "--:--";
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return `${m}:${s.toString().padStart(2, "0")}`;
}


function renderListeningPractice(store, navigate) {
  const state = store.getState();
  const folder = store.getCurrentFolder();
  const listeningModules = folder ? folder.modules.filter((item) => item.type === "listening") : [];

  if (listeningModules.length === 0) {
    const el = document.createElement("div");
    el.className = "stack-layout";
    el.innerHTML = `<section class="paper-panel"><p class="label">Listening Practice</p><h3>暂无听力模块</h3><p>去导入中心添加听力内容。</p></section>`;
    return el;
  }

  const dictationModule = listeningModules.find((m) => m.mode === "dictation") || listeningModules[0];
  const compModule = listeningModules.find((m) => m.mode === "comprehension");
  const activeMode = state.routePayload?.mode || (compModule ? "comprehension" : "dictation");
  const module = activeMode === "comprehension" && compModule ? compModule : dictationModule;

  const el = document.createElement("div");
  el.className = "stack-layout";

  let bodyHTML = "";
  let isCETComprehension = false;

  if (module.mode === "comprehension") {
    // CET-style: use the cet-listening layout
    isCETComprehension = true;
    bodyHTML = `
      <div class="audio-player-container" data-audio-player-anchor></div>
      ${renderMCQSection(module, "cet-listening")}
    `;
  } else {
    // Dictation / 精听训练
    const allAnswered = module.items.every((item) => item.isCorrect !== null);
    bodyHTML = `
      <p class="listening-hint">🎧 精听训练模式：先播放音频，在空格处填入你听到的单词。提交后进入精听层，查看重点词汇高亮和错题挖空复习。</p>
      <article class="listening-transcript">
        <p>${module.transcript}</p>
      </article>
      <div class="question-list">
        ${module.items
          .map(
            (item, index) => `
          <label class="question-item">
            <span>${index + 1}. ${item.prompt}</span>
            <input data-item-id="${item.id}" value="${item.userAnswer || ""}" placeholder="输入听到的单词" />
            ${
              item.isCorrect === null
                ? ""
                : `<small class="${item.isCorrect ? "text-correct" : "text-wrong"}">${
                    item.isCorrect ? "✓ 正确" : `✗ 正确答案：${item.answer}`
                  }</small>`
            }
          </label>
        `
          )
          .join("")}
      </div>
      <div class="hero-actions">
        <button class="primary-btn" data-action="submit">提交并进入精听训练</button>
        ${allAnswered ? '<button class="secondary-btn" data-action="intensive">查看精听训练层</button>' : ""}
      </div>
    `;
  }

  el.innerHTML = `
    <section class="paper-panel ${isCETComprehension ? "cet-listening-layout" : "listening-layout"}">
      <div class="reading-header">
        <div>
          <p class="label">听 力 练 习</p>
          <h3>${module.title}</h3>
        </div>
        <div class="import-tabs">
          ${compModule ? `<button class="import-tab ${activeMode === "comprehension" ? "active" : ""}" data-tab="comprehension">🔊 听力原题</button>` : ""}
          <button class="import-tab ${activeMode === "dictation" ? "active" : ""}" data-tab="dictation">🎧 精听训练</button>
        </div>
      </div>
      ${bodyHTML}
    </section>
  `;

  // Audio player for comprehension mode
  if (isCETComprehension) {
    const audioAnchor = el.querySelector("[data-audio-player-anchor]");
    if (audioAnchor) {
      const audioPlayer = createAudioPlayer({
        duration: 150,
        label: "🔊 播放听力音频 · Conversation 1 & 2",
        audioSrc: module.audioData || null,
        onEnded: () => {},
      });
      audioAnchor.appendChild(audioPlayer);
    }
  }

  // Tab switching
  el.querySelectorAll("[data-tab]").forEach((tab) => {
    tab.addEventListener("click", () => {
      const mode = tab.dataset.tab;
      store.actions.setRoute("listening", { mode });
      navigate("listening", { mode });
    });
  });

  // Dictation submit
  const submitBtn = el.querySelector('[data-action="submit"]');
  if (submitBtn) {
    submitBtn.addEventListener("click", () => {
      const answers = {};
      el.querySelectorAll("[data-item-id]").forEach((input) => {
        answers[input.dataset.itemId] = input.value;
      });
      store.actions.submitListeningAnswers(module.id, answers);
      navigate("listening", { mode: "dictation" });
    });
  }

  // MCQ submit
  bindMCQSubmit(el, module, (moduleId, answers) => {
    store.actions.submitListeningAnswers(moduleId, answers);
    navigate("listening", { mode: "comprehension" });
  });

  // Intensive layer link
  el.querySelector('[data-action="intensive"]')?.addEventListener("click", () => {
    navigate("listening-intensive", { moduleId: module.id });
  });

  return el;
}



function renderIntensiveLayer(store, navigate) {
  const state = store.getState();
  const moduleId = state.routePayload?.moduleId;
  const module = store.getModuleById(moduleId);

  if (!module) {
    const el = document.createElement("div");
    el.className = "stack-layout";
    el.innerHTML = `
      <section class="paper-panel">
        <p class="label">Intensive Listening</p>
        <h3>未找到对应的听力模块</h3>
        <p>请先从听力练习页进入精听训练层。</p>
        <div class="hero-actions">
          <button class="secondary-btn" data-action="back">返回听力练习</button>
        </div>
      </section>
    `;
    el.querySelector('[data-action="back"]').addEventListener("click", () => navigate("listening"));
    return el;
  }

  const highlight = createHighlighter(state.cetVocabulary, state.projectKeywords);
  const highlightedTranscript = highlight(module.transcript);

  const wrongItems = module.items.filter((item) => item.isCorrect === false);
  const correctCount = module.items.filter((item) => item.isCorrect === true).length;

  const el = document.createElement("div");
  el.className = "stack-layout";

  el.innerHTML = `
    <section class="paper-panel intensive-layout">
      <div class="reading-header">
        <div>
          <p class="label">🎯 精听训练层</p>
          <h3>${module.title}</h3>
          <p>重点词汇已高亮，回顾原文并对照你的答案。</p>
        </div>
        <span class="count-badge">${correctCount}/${module.items.length} 正确</span>
      </div>

      <div class="intensive-panels">
        <article class="intensive-transcript">
          <p class="label">原文 · 词汇高亮</p>
          <div class="reading-passage">${highlightedTranscript}</div>
        </article>

        <article class="intensive-review">
          <p class="label">你的答案回顾</p>
          <div class="intensive-answers">
            ${module.items
              .map(
                (item) => `
              <div class="intensive-answer-row ${item.isCorrect ? "correct" : "wrong"}">
                <span class="gap-label">${item.prompt}</span>
                <span class="gap-arrow">→</span>
                <span class="gap-value">${item.userAnswer || "（未填写）"}</span>
                ${!item.isCorrect ? `<span class="gap-correct">(${item.answer})</span>` : ""}
                <span class="gap-mark">${item.isCorrect ? "✓" : "✗"}</span>
              </div>
            `
              )
              .join("")}
          </div>

          ${
            wrongItems.length > 0
              ? `
          <div class="intensive-cloze">
            <p class="label">错题挖空复习</p>
            <div class="cloze-passage">
              ${highlightCloze(module.transcript, wrongItems, highlight)}
            </div>
          </div>`
              : `<p class="text-correct intensive-all-correct">🎉 全部正确，太棒了！</p>`
          }
        </article>
      </div>

      <div class="hero-actions">
        <button class="secondary-btn" data-action="back">返回听力练习</button>
        <button class="primary-btn" data-action="retry">重新练习</button>
      </div>
    </section>
  `;

  el.querySelector('[data-action="back"]').addEventListener("click", () => navigate("listening"));
  el.querySelector('[data-action="retry"]').addEventListener("click", () => {
    store.actions.resetModuleAnswers(moduleId);
    navigate("listening");
  });

  return el;
}

function highlightCloze(transcript, wrongItems, highlightFn) {
  let result = highlightFn(transcript);
  const sorted = [...wrongItems].sort((a, b) => b.answer.length - a.answer.length);

  for (const item of sorted) {
    const escaped = item.answer.replace(/[.*+?^${}()|[\]\\]/g, "\\</body>");
    const regex = new RegExp(`\\b${escaped}\\b`, "gi");
    result = result.replace(regex, `<span class="cloze-blank">${item.answer}</span>`);
  }

  return result;
}

function extractKeywords(text) {
  // Extract meaningful English words (3+ chars, not just stopwords)
  const stopWords = new Set(["the","and","for","not","are","how","can","that","this","with","when","from","its","has","but","was","now","all"]);
  const words = text.toLowerCase().replace(/[.,;!?()"']/g, " ").split(/\s+/).filter(w => w.length >= 3 && !stopWords.has(w));
  return [...new Set(words)];
}

function computeSimilarity(userText, refText) {
  if (!userText.trim()) return 0;
  const refKeywords = extractKeywords(refText);
  if (refKeywords.length === 0) return 0;
  const userLower = userText.toLowerCase();
  const matched = refKeywords.filter(kw => userLower.includes(kw));
  return Math.round((matched.length / refKeywords.length) * 100);
}

function highlightMatches(userText, refText) {
  const refKeywords = extractKeywords(refText);
  const words = userText.split(/(\s+)/);
  return words.map(w => {
    const clean = w.replace(/[.,;!?()"']/g, "").toLowerCase();
    if (clean.length >= 3 && refKeywords.includes(clean)) {
      return `<mark class="trans-match">${w}</mark>`;
    }
    return w;
  }).join("");
}

function renderTranslation(store, navigate) {
  const state = store.getState();
  const folder = store.getCurrentFolder();
  const transModules = folder ? folder.modules.filter((item) => item.type === "translation") : [];

  if (transModules.length === 0) {
    const el = document.createElement("div");
    el.className = "stack-layout";
    el.innerHTML = `
      <section class="paper-panel">
        <p class="label">Translation</p>
        <h3>当前试卷暂无翻译练习</h3>
        <p>去导入中心为当前试卷添加翻译模块。</p>
      </section>
    `;
    return el;
  }

  const module = transModules[0];
  const allAnswered = module.items.every((item) => item.userAnswer.trim() !== "");
  const checked = state.routePayload?.checked;

  const el = document.createElement("div");
  el.className = "stack-layout";

  let itemsHTML = "";
  if (checked) {
    // Checked mode: show side-by-side comparison with highlights
    const totalScore = module.items.reduce((sum, item) => sum + computeSimilarity(item.userAnswer, item.reference), 0);
    const avgScore = Math.round(totalScore / module.items.length);

    itemsHTML = `
      <div class="trans-score-bar">
        <div class="trans-score-label">整体相似度</div>
        <div class="trans-score-meter">
          <div class="trans-score-fill" style="width:${avgScore}%"></div>
        </div>
        <div class="trans-score-num">${avgScore}%</div>
      </div>
      ${module.items.map((item, index) => {
        const similarity = computeSimilarity(item.userAnswer, item.reference);
        return `
          <div class="trans-compare-item">
            <div class="trans-compare-header">
              <span class="translation-num">${index + 1}</span>
              <span class="trans-compare-source">${item.source}</span>
              <span class="trans-compare-score" style="color:${similarity >= 60 ? 'var(--accent)' : similarity >= 30 ? '#b78b3d' : '#b75b3d'}">${similarity}% 匹配</span>
            </div>
            <div class="trans-compare-body">
              <div class="trans-compare-col">
                <div class="trans-compare-label">你的翻译</div>
                <div class="trans-compare-text trans-user">${highlightMatches(item.userAnswer, item.reference)}</div>
              </div>
              <div class="trans-compare-col">
                <div class="trans-compare-label">参考译文</div>
                <div class="trans-compare-text trans-ref">${item.reference}</div>
              </div>
            </div>
          </div>
        `;
      }).join("")}
    `;
  } else {
    // Input mode
    itemsHTML = module.items.map((item, index) => `
      <div class="translation-item">
        <div class="translation-source">
          <span class="translation-num">${index + 1}</span>
          <p>${item.source}</p>
        </div>
        <textarea
          class="translation-input"
          data-item-id="${item.id}"
          placeholder="输入你的翻译..."
          rows="3"
        >${item.userAnswer || ""}</textarea>
      </div>
    `).join("");
  }

  el.innerHTML = `
    <section class="paper-panel translation-layout">
      <div class="reading-header">
        <div>
          <p class="label">Translation Practice</p>
          <h3>${module.title}</h3>
          <p>${module.summary}</p>
        </div>
      </div>
      <div class="translation-list">
        ${itemsHTML}
      </div>
      <div class="hero-actions">
        ${checked
          ? '<button class="secondary-btn" data-action="reset">重新翻译</button>'
          : allAnswered
            ? `
              <button class="secondary-btn" data-action="reset">清空重写</button>
              <button class="primary-btn" data-action="check">核对答案</button>
            `
            : '<button class="primary-btn" data-action="save">保存翻译</button>'
        }
      </div>
    </section>
  `;

  if (!checked) {
    const saveBtn = el.querySelector('[data-action="save"]');
    if (saveBtn) {
      saveBtn.addEventListener("click", () => {
        el.querySelectorAll("[data-item-id]").forEach((input) => {
          const item = module.items.find((i) => i.id === input.dataset.itemId);
          if (item) item.userAnswer = input.value;
        });
        state.studyLog.unshift({
          id: `log-${Date.now()}`,
          type: "translation",
          projectId: state.currentProjectId,
          date: new Date().toISOString(),
          title: module.title,
        });
        state.checkin = evaluateCheckinStatus(state.studyLog);
        navigate("translation");
      });
    }

    const checkBtn = el.querySelector('[data-action="check"]');
    if (checkBtn) {
      checkBtn.addEventListener("click", () => {
        el.querySelectorAll("[data-item-id]").forEach((input) => {
          const item = module.items.find((i) => i.id === input.dataset.itemId);
          if (item) item.userAnswer = input.value;
        });
        state.studyLog.unshift({
          id: `log-${Date.now()}`,
          type: "translation",
          projectId: state.currentProjectId,
          date: new Date().toISOString(),
          title: module.title,
        });
        module.items.forEach((item) => {
          item.isCorrect = computeSimilarity(item.userAnswer, item.reference) >= 50;
        });
        state.checkin = evaluateCheckinStatus(state.studyLog);
        navigate("translation", { checked: true });
      });
    }

    const resetBtn = el.querySelector('[data-action="reset"]');
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        module.items.forEach((item) => (item.userAnswer = ""));
        navigate("translation");
      });
    }
  } else {
    const resetBtn = el.querySelector('[data-action="reset"]');
    if (resetBtn) {
      resetBtn.addEventListener("click", () => {
        module.items.forEach((item) => (item.userAnswer = ""));
        navigate("translation", { checked: false });
      });
    }
  }

  return el;
}

function renderVocabulary(store, navigate) {
  const folder = store.getCurrentFolder();
  const vocabModules = folder ? folder.modules.filter((item) => item.type === "vocabulary") : [];

  const el = document.createElement("div");
  el.className = "stack-layout";

  if (vocabModules.length === 0) {
    el.innerHTML = `
      <section class="paper-panel">
        <p class="label">Vocabulary</p>
        <h3>当前试卷暂无词汇表</h3>
        <p>去导入中心为当前试卷添加词汇模块，或从已有词汇模块中复习。</p>
      </section>
    `;
    return el;
  }

  const allWords = vocabModules.flatMap((mod) => mod.vocabulary || []);
  const mastered = allWords.filter((w) => w.mastered).length;

  el.innerHTML = `
    <section class="paper-panel">
      <div class="reading-header">
        <div>
          <p class="label">Vocabulary · ${folder.title}</p>
          <h3>词汇表</h3>
          <p>${allWords.length} 个单词 · ${mastered} 已掌握</p>
        </div>
        <div class="hero-actions">
          <button class="primary-btn" data-action="add-all-flashcards">全部加入闪卡</button>
        </div>
      </div>
      <div class="vocab-list">
        ${allWords
          .map(
            (word, index) => `
          <div class="vocab-card ${word.mastered ? "vocab-mastered" : ""}">
            <div class="vocab-head">
              <span class="vocab-num">${index + 1}</span>
              <div>
                <h4>${word.word}</h4>
                <span class="vocab-pos">${word.pos}</span>
              </div>
              <span class="vocab-toggle" data-word="${word.word}">${word.mastered ? "✓ 已掌握" : "标记掌握"}</span>
            </div>
            <p class="vocab-zh">${word.zh}</p>
            ${word.context ? `<p class="vocab-context">📖 ${word.context}</p>` : ""}
          </div>
        `
          )
          .join("")}
      </div>
    </section>
  `;

  el.querySelector('[data-action="add-all-flashcards"]').addEventListener("click", () => {
    const state = store.getState();
    const existingWords = new Set(state.flashcards.map((c) => c.word.toLowerCase()));
    allWords.forEach((w) => {
      if (!existingWords.has(w.word.toLowerCase())) {
        state.flashcards.push({ ...w, id: `flash-${w.word.toLowerCase()}` });
      }
    });
    navigate("flashcards");
  });

  el.querySelectorAll(".vocab-toggle").forEach((span) => {
    span.addEventListener("click", () => {
      const word = allWords.find((w) => w.word === span.dataset.word);
      if (word) word.mastered = !word.mastered;
      navigate("vocabulary");
    });
  });

  return el;
}

    });
  });

    });

    const blob = new Blob([json], { type: "application/json" });

    const a = document.createElement("a");

  el.querySelector('[data-action="import-trigger"]')?.addEventListener("click", () => {
    fileInput.click();
  });
  fileInput?.addEventListener("change", () => {
    const file = fileInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data.version || !data.state) {
          alert("无效的备份文件格式。");
          return;
        }
        if (confirm("导入将覆盖当前所有学习数据（项目、错题、闪卡等），确定继续？")) {
          localStorage.setItem(STORAGE_KEY, reader.result);
          location.reload();
        }
      } catch {
        alert("文件解析失败，请确认是有效的 JSON 备份文件。");
      }
    };
    reader.readAsText(file);
  });

  // Change storage key
  el.querySelector('[data-action="change-key"]')?.addEventListener("click", () => {
    const newKey = el.querySelector('.settings-key-input')?.value?.trim();
    if (!newKey) return;
    if (newKey === STORAGE_KEY) return;
    if (!confirm(`将数据从 "${STORAGE_KEY}" 迁移到 "${newKey}"，刷新后生效。确定？`)) return;
    const existing = localStorage.getItem(STORAGE_KEY);
    if (existing) {
      localStorage.setItem(newKey, existing);
      localStorage.removeItem(STORAGE_KEY);
    }
    location.reload();
  });

  return el;
}

  import: renderImportCenter,
  reading: renderReadingPractice,
  mistakes: renderMistakes,
  flashcards: renderFlashcards,
  checkin: renderCheckin,
  listening: renderListeningPractice,
  "listening-intensive": renderIntensiveLayer,
  profile: renderProfile,
  translation: renderTranslation,
  vocabulary: renderVocabulary,
  settings: renderSettings,
};

const initialState = createHydratedState(seedState);
const store = createStore(initialState, {
  persist(state) {
    persistState(state);
  },
});
const app = document.getElementById("app");

function renderShell(contentNode) {
  const shell = createAppShell(store, navigate);
  shell.querySelector("[data-shell-content]").appendChild(contentNode);
  app.replaceChildren(shell);
}

function navigate(route, payload = {}) {
  store.actions.setRoute(route, payload);

  const render = routes[route];
  if (render) {
    renderShell(render(store, navigate));
    return;
  }

  // fallback: dashboard
  const state = store.getState();
  if (!state.currentProjectId) {
    store.actions.selectProject(state.projects[0]?.id ?? null);
  }
  renderShell(renderDashboard(store, navigate));
}

try {
  navigate("dashboard");
} catch (e) {
  console.error("Init failed, clearing storage and retrying:", e);
  try { globalThis.localStorage?.removeItem("review-system:v2"); } catch {}
  try { globalThis.localStorage?.removeItem("review-system:v1"); } catch {}
  const fresh = createHydratedState(seedState);
  const store2 = createStore(fresh, { persist(s) { persistState(s); } });
  const dash = renderDashboard(store2, (route, payload) => {
    store2.actions.setRoute(route, payload);
    const shell2 = createAppShell(store2, () => {});
    const renderFn = routes[route];
    if (renderFn) {
      shell2.querySelector("[data-shell-content]").appendChild(renderFn(store2, () => {}));
    }
    app.replaceChildren(shell2);
  });
  const shell2 = createAppShell(store2, () => {});
  shell2.querySelector("[data-shell-content]").appendChild(dash);
  app.replaceChildren(shell2);
}
